name: Spring Boot Agent Wiki
description: >-
  Teaches AI coding tools how to use and maintain agent-ready Spring Boot
  repository wikis for safer code changes. Guides agents to consult generated
  architecture, Spring layer, data access, testing, operations, build, and
  safe-change documentation before modifying code. Covers deterministic static
  scanning, source-linked markdown pages, annotation-aware component discovery,
  configuration and dependency summaries, idempotency guardrails, Java record
  serialization guidance, time-safe design with java.time.Clock, and
  architectural guardrails for AI-assisted development. Helps agents refresh
  repository knowledge after service-layer, business-logic, README,
  configuration, YAML, Docker, Kubernetes, and build changes.
