name: Kubernetes Persistent Storage for JVM/Spring Applications
description: >-
  Teaches AI coding tools how JVM applications behave on Kubernetes persistent
  and ephemeral volumes: container memory sizing with -XX:MaxRAMPercentage,
  java.nio file I/O and FileLock risks on shared PVCs, ShedLock-style
  coordination, JVM temp-dir, heap-dump, and GC-log placement, PVC access-mode
  implications, typed Spring storage configuration, and backup-first remediation.
