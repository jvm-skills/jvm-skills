name: Kubernetes Persistent Storage for JVM/Spring Applications
description: >-
  Teaches AI coding tools how JVM/Spring applications should reason about
  Kubernetes-specific storage behavior: PVC access modes, ReadWriteOncePod,
  ReadWriteMany shared-path risks, emptyDir size limits, ephemeral-storage
  eviction, StorageClass expansion and snapshot capability, StatefulSet volume
  identity, Kubernetes Lease coordination, Spring Integration LockRegistry, and
  ShedLock-scoped scheduled work on shared volumes.
