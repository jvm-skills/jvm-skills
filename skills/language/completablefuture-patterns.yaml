name: CompletableFuture Patterns
description: >-
  CompletableFuture best practices for asynchronous Java pipelines: operator
  selection (supplyAsync, thenApply, thenCompose, thenCombine, allOf, anyOf),
  the two-phase launch/join pattern, anti-patterns (blocking inside the
  pipeline, shared mutable state), dedicated executors with named
  ThreadFactory, bounding in-flight tasks with Semaphore and
  Gatherers.mapConcurrent (Java 24+), error handling with exceptionally/
  handle/whenComplete, timeouts with orTimeout/completeOnTimeout, and
  sealed response types for modeling failure as data in fan-in reductions.
